name: Laravel CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.2
        extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath

    - name: Create SQLite Database
      run: |
        mkdir -p database
        touch database/database.sqlite

    - name: Create .env file
      run: |
        cp .env.example .env
        sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/g' .env

    - name: Configure Environment
      run: |
        echo "DB_CONNECTION=sqlite" >> .env
        echo "DB_DATABASE=$(pwd)/database/database.sqlite" >> .env
        echo "CACHE_STORE=file" >> .env
        echo "SESSION_DRIVER=file" >> .env
        echo "QUEUE_CONNECTION=sync" >> .env

    - name: Install Dependencies
      run: composer install --no-interaction --prefer-dist

    - name: Install SQLite PHP extension
      run: |
        sudo apt-get update
        sudo apt-get install -y php-sqlite3

    - name: Generate App Key
      run: php artisan key:generate

    - name: Clear Caches
      run: |
        php artisan config:clear
        php artisan cache:clear
        php artisan route:clear
        php artisan view:clear

    - name: Set Permissions
      run: chmod -R 777 storage bootstrap/cache

    - name: Run Database Migrations
      run: php artisan migrate --force

    - name: Run Tests
      run: |
        php artisan test | tee test-results.txt

    - name: Upload Test Artifact
      uses: actions/upload-artifact@v4
      with:
        name: laravel-test-results
        path: test-results.txt

   deploy:
    needs: test

    runs-on:
        - self-hosted

    steps:
      - name: Deploy Application
        run: |
            set -e

            APP_DIR="/var/www/auto-clinic"

            echo "Resetting deployment directory..."

            sudo rm -rf "$APP_DIR"
            sudo mkdir -p "$APP_DIR"
            sudo chown -R $USER:$USER "$APP_DIR"

            echo "Cloning repository..."
            git clone https://github.com/mamun-zavisoft/auto-clinic-deploy.git "$APP_DIR"

            cd "$APP_DIR"

            echo "Installing dependencies..."
            composer install --no-interaction --prefer-dist --optimize-autoloader

            echo "Setting up environment..."

            if [ ! -f .env ]; then
                cp .env.example .env
            fi

            # Force MySQL configuration
            sed -i 's/DB_CONNECTION=sqlite/DB_CONNECTION=mysql/g' .env

            # Add your production database credentials
            sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/g' .env
            sed -i 's/DB_PORT=.*/DB_PORT=3306/g' .env
            sed -i 's/DB_DATABASE=.*/DB_DATABASE=your_database_name/g' .env
            sed -i 's/DB_USERNAME=.*/DB_USERNAME=your_database_user/g' .env
            sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=your_database_password/g' .env

            php artisan key:generate --force

            # Clear old cached configs
            php artisan config:clear
            php artisan cache:clear
            php artisan optimize:clear

            php artisan key:generate || true

            echo "Fixing permissions..."
            chmod -R 775 storage bootstrap/cache

            echo "Running migrations..."
            php artisan migrate --force

            echo "Optimizing Laravel..."
            php artisan optimize:clear
            php artisan optimize

            echo "Deployment Successful 🚀"
